<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edgistify Lead Qualification Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  body { font-family:'Inter',sans-serif; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .animate-in { animation:fadeIn 0.4s ease-out forwards; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const Icon = ({name,size=20,className=''}) => {
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); },[name]);
  return <i data-lucide={name} style={{width:size,height:size}} className={className}></i>;
};

// ── OUTREACH GUIDE PAGE ──────────────────────────────────────────────
const OutreachGuidePage = () => {

  const steps = [
    {
      num: '01',
      title: 'Identify the Lead Source',
      icon: 'map-pin',
      color: 'blue',
      desc: 'Every lead enters through one of two tracks. Identify which before proceeding.',
      twoTrack: true,
      tracks: [
        {
          label: 'Track 1 — Sprint',
          badge: 'bg-blue-100 text-blue-700 border-blue-200',
          bar: 'bg-blue-500',
          icon: 'trending-up',
          sub: 'Management-assigned leads',
          points: [
            'Leads are assigned directly by management — these are pre-vetted, high-conversion-potential accounts.',
            'Source is inbound, referred, or flagged by leadership based on strategic fit.',
            'Skip the Sales Research Sprint — proceed straight to Step 3 (Trigger Events & Sales Hook).',
            'Log the lead in Zoho CRM immediately with source marked as "Sprint".',
          ],
          action: 'Go to Step 3 → Check Trigger Events & Find a Sales Hook',
        },
        {
          label: 'Track 2 — Sales Research',
          badge: 'bg-indigo-100 text-indigo-700 border-indigo-200',
          bar: 'bg-indigo-500',
          icon: 'search',
          sub: 'Self-sourced outbound leads',
          points: [
            'Rep independently identifies and sources leads via Tracxn, Google, LinkedIn, or industry databases.',
            'No pre-vetting — the rep owns the research and qualification from scratch.',
            'Must complete the full Sales Research Sprint (Step 2) before progressing.',
            'Log the lead in Zoho CRM immediately with source marked as "Research".',
          ],
          action: 'Go to Step 2 → Sales Research Sprint',
        },
      ],
      mergeNote: 'Both tracks merge at Step 5 — Outreach',
    },
    {
      num: '02',
      title: 'Sales Research Sprint',
      icon: 'search',
      color: 'indigo',
      desc: 'Track 2 only. Conduct focused, time-boxed research before any outreach.',
      trackBadge: 'Track 2 — Sales Research Only',
      items: [
        'Company size, estimated revenue, industry vertical, and geographic presence.',
        'Tech stack or logistics setup — what tools or 3PLs are they currently using?',
        'Key decision makers: Founder, CEO, VP Supply Chain, or Head of Logistics.',
        'Recent company news: funding rounds, expansions, leadership changes, new product lines.',
        'Job postings that signal growth or a logistics need.',
        'Use Tracxn for startup data and revenue estimates.',
      ],
    },
    {
      num: '03',
      title: 'Categorise the Lead — A, B, C, or D',
      icon: 'tag',
      color: 'violet',
      desc: 'Both tracks. Categorisation is mandatory. Use the Gemini Category Tool for every lead.',
      sub: true,
      categories: [
        {
          label: 'Category A',
          badge: 'bg-emerald-100 text-emerald-700 border-emerald-200',
          bar: 'bg-emerald-500',
          rules: [
            'High-revenue company with clear logistics volume (typically ₹50Cr+ turnover).',
            'Active supply chain operations — warehouse, fulfilment, or last-mile activity.',
            'Decision maker is reachable and title-verifiable (Founder, CEO, SCM Head).',
            'Operates in a sector Edgistify directly serves: D2C, FMCG, pharma, e-commerce, retail.',
            'Shows a trigger event: recent funding, expansion, or new distribution channel.',
          ],
          action: 'Minimum 3 contacts identified. Follow up within 15 days. High sprint priority.',
        },
        {
          label: 'Category B',
          badge: 'bg-blue-100 text-blue-700 border-blue-200',
          bar: 'bg-blue-500',
          rules: [
            'Mid-sized company with moderate logistics activity (₹10Cr–₹50Cr range).',
            'Supply chain need exists but is less urgent or less defined.',
            'Decision maker identified but may need multiple touchpoints to engage.',
            'Sector is relevant but not a primary target vertical.',
            'No strong trigger event, but growth trajectory is positive.',
          ],
          action: 'Minimum 3 contacts identified. Follow up within 15 days. Schedule 60-day re-engagement if no immediate requirement.',
        },
        {
          label: 'Category C',
          badge: 'bg-amber-100 text-amber-700 border-amber-200',
          bar: 'bg-amber-400',
          rules: [
            'Smaller company with limited or unverified logistics volume.',
            'Sector relevance is tangential — not a primary Edgistify use case.',
            'Decision maker is hard to identify or not accessible.',
            'No visible trigger event or growth signal.',
          ],
          action: 'Lower priority. Add to CRM but deprioritise in sprint plan. Revisit quarterly.',
        },
        {
          label: 'Category D',
          badge: 'bg-red-100 text-red-700 border-red-200',
          bar: 'bg-red-400',
          rules: [
            'No discernible logistics requirement.',
            'Company is too small, irrelevant sector, or already using a competing solution with a long-term contract.',
            'No accessible decision maker after multiple research attempts.',
          ],
          action: 'Do not pursue. Mark as Junk in Zoho and move on.',
        },
      ],
    },
    {
      num: '04',
      title: 'Check Trigger Events & Build a Sales Hook',
      icon: 'zap',
      color: 'amber',
      desc: 'Sprint leads enter here. Every outreach call needs a reason — never call without a hook.',
      trackBadge: 'Sprint leads start here — Both tracks continue from this point',
      items: [
        'Recent funding (Series A/B/C) — signals scale-up and logistics need.',
        'New product launch or SKU expansion — fulfilment complexity increases.',
        'Geographic expansion — new warehousing or last-mile requirements.',
        'Leadership hire in supply chain or operations — new decision maker is open to change.',
        'Job postings for logistics, warehouse, or ops roles — active pain point.',
        'News coverage mentioning delivery issues, delays, or scaling challenges.',
        'Use the Gemini Sales Hook Tool to generate a contextualised hook for each lead.',
      ],
    },
    {
      num: '05',
      title: 'Add to Sprint Plan Module in Zoho',
      icon: 'database',
      color: 'slate',
      desc: 'Both tracks are now unified. Log everything before you pick up the phone.',
      trackBadge: 'Both tracks fully merged from here onwards',
      items: [
        'Create or update the company record in Zoho CRM with source, category, and all research notes.',
        'Add the sprint plan entry: company, contact names, trigger event, and your planned sales hook.',
        'For A & B category accounts: identify and log at least 3 contacts before outreach begins.',
        'Enrich contact data using Lusha (mobile numbers, emails) or SignalHire (decision maker profiles).',
        'Set the initial outreach task — no lead should enter the sprint without a scheduled action.',
      ],
    },
    {
      num: '06',
      title: 'Outreach & Contact Rules',
      icon: 'phone-call',
      color: 'indigo',
      desc: 'Who you call matters as much as what you say.',
      items: [
        'Target decision makers only: Founders, CEOs, Directors, VP/Head of Supply Chain or Logistics.',
        'A wrong contact is not an excuse to close — if you reached the wrong person, find the right one.',
        'Use your trigger event as the opening line — make the reason for calling immediately clear.',
        'If the outreach fails: retry with a different channel (call → email → LinkedIn) before escalating.',
        'If connected but not the relevant contact: find the right person and loop back. Do not mark as junk.',
        'If you exhaust 3 contacts at an account with no requirement: mark as Junk.',
      ],
    },
    {
      num: '07',
      title: 'Requirement Check & Qualification',
      icon: 'check-circle',
      color: 'emerald',
      desc: 'Never mark "No Requirement" without a full service walkthrough.',
      items: [
        'MANDATORY: Explain all Edgistify services before deciding there is no requirement.',
        'Services include: warehousing, fulfilment, last-mile delivery, reverse logistics, tech platform.',
        'If requirement confirmed: mark as Qualified in Zoho and schedule a demo immediately.',
        'If no immediate requirement but A or B category: do not junk — move to follow-up.',
        'If no requirement and C or D category: mark as Junk.',
      ],
    },
    {
      num: '08',
      title: 'Follow-Up Rules',
      icon: 'calendar-clock',
      color: 'amber',
      desc: 'No lead should ever sit idle without a next action.',
      items: [
        'If the client gives a specific follow-up date: create a task for that exact day in Zoho.',
        'If no date is given: create a mandatory 60-day follow-up task.',
        'A & B category leads must be re-engaged every 15 days to maintain momentum.',
        'If a contact goes cold, try a different decision maker at the same account before closing.',
        'Every task must have a note: last conversation summary, current status, and next objective.',
      ],
    },
  ];

  const stepColors = {
    blue:   { bg:'bg-blue-50',   border:'border-blue-100',  icon:'bg-blue-600',   num:'text-blue-200',  tag:'bg-blue-100 text-blue-700' },
    indigo: { bg:'bg-indigo-50', border:'border-indigo-100',icon:'bg-indigo-600', num:'text-indigo-200',tag:'bg-indigo-100 text-indigo-700' },
    violet: { bg:'bg-violet-50', border:'border-violet-100',icon:'bg-violet-600', num:'text-violet-200',tag:'bg-violet-100 text-violet-700' },
    amber:  { bg:'bg-amber-50',  border:'border-amber-100', icon:'bg-amber-500',  num:'text-amber-200', tag:'bg-amber-100 text-amber-700' },
    slate:  { bg:'bg-slate-50',  border:'border-slate-200', icon:'bg-slate-600',  num:'text-slate-300', tag:'bg-slate-100 text-slate-600' },
    emerald:{ bg:'bg-emerald-50',border:'border-emerald-100',icon:'bg-emerald-600',num:'text-emerald-200',tag:'bg-emerald-100 text-emerald-700' },
  };

  return (
    <div className="animate-in space-y-6">
      {/* Header */}
      <div className="flex flex-col md:flex-row md:items-start justify-between gap-4">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">Lead Enrichment & Outreach Guide</h1>
          <p className="text-slate-500 text-sm mt-1">Step-by-step process for researching, categorising, and qualifying leads — including full A & B category rules.</p>
        </div>
        <div className="flex items-center gap-2 flex-shrink-0">
          <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">8 Steps</span>
          <div className="w-px h-4 bg-slate-200"></div>
          <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">4 Categories</span>
        </div>
      </div>

      {/* Steps */}
      <div className="space-y-4">
        {steps.map((step, i) => {
          const c = stepColors[step.color];
          return (
            <div key={i} className={`rounded-2xl border ${c.border} ${c.bg} overflow-hidden`}>
              {/* Step header */}
              <div className="flex items-center gap-4 px-6 py-4 border-b border-inherit">
                <div className={`w-9 h-9 rounded-xl ${c.icon} text-white flex items-center justify-center flex-shrink-0`}>
                  <Icon name={step.icon} size={17}/>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-0.5">
                    <span className={`text-[10px] font-black uppercase tracking-widest ${c.num.replace('text-','text-').replace('-200','-400')}`}>Step {step.num}</span>
                  </div>
                  <h2 className="text-base font-black text-slate-900 leading-tight">{step.title}</h2>
                </div>
                <span className={`hidden md:block text-[11px] font-medium px-3 py-1 rounded-full border ${c.tag} flex-shrink-0`}>{step.desc}</span>
              </div>

              {/* Step body */}
              <div className="px-6 py-5">

                {/* Track badge for track-specific steps */}
                {step.trackBadge && (
                  <div className="mb-4">
                    <span className={`text-[10px] font-black px-3 py-1.5 rounded-full uppercase tracking-wider border ${
                      step.color === 'amber' ? 'bg-amber-100 text-amber-700 border-amber-200' :
                      step.color === 'indigo' ? 'bg-indigo-100 text-indigo-700 border-indigo-200' :
                      'bg-slate-100 text-slate-600 border-slate-200'
                    }`}>{step.trackBadge}</span>
                  </div>
                )}

                {/* Two-track layout */}
                {step.twoTrack && (
                  <div className="space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {step.tracks.map((track, j) => (
                        <div key={j} className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                          <div className={`h-1 ${track.bar}`}></div>
                          <div className="p-4">
                            <div className="flex items-center gap-2 mb-3">
                              <div className={`w-7 h-7 rounded-lg flex items-center justify-center ${track.bar} text-white flex-shrink-0`}>
                                <Icon name={track.icon} size={13}/>
                              </div>
                              <div>
                                <span className={`text-[10px] font-black px-2 py-0.5 rounded-full border ${track.badge}`}>{track.label}</span>
                                <p className="text-[11px] text-slate-500 mt-0.5">{track.sub}</p>
                              </div>
                            </div>
                            <div className="space-y-2 mb-4">
                              {track.points.map((pt, k) => (
                                <div key={k} className="flex items-start gap-2">
                                  <Icon name="check" size={12} className="text-slate-400 mt-0.5 flex-shrink-0"/>
                                  <p className="text-xs text-slate-600 leading-relaxed">{pt}</p>
                                </div>
                              ))}
                            </div>
                            <div className="pt-3 border-t border-slate-100 flex items-center gap-2">
                              <Icon name="arrow-right" size={12} className="text-blue-500 flex-shrink-0"/>
                              <p className="text-[11px] font-bold text-blue-600">{track.action}</p>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                    {/* Merge note */}
                    <div className="flex items-center gap-3 bg-slate-900 rounded-xl px-5 py-3">
                      <Icon name="git-merge" size={16} className="text-slate-400 flex-shrink-0"/>
                      <p className="text-sm font-bold text-white">{step.mergeNote}</p>
                    </div>
                  </div>
                )}

                {/* Regular bullet steps */}
                {step.items && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2">
                    {step.items.map((item, j) => (
                      <div key={j} className="flex items-start gap-2.5">
                        <div className={`mt-1.5 w-1.5 h-1.5 rounded-full flex-shrink-0 ${c.icon}`}></div>
                        <p className="text-sm text-slate-700 leading-relaxed">{item}</p>
                      </div>
                    ))}
                  </div>
                )}

                {/* Category cards */}
                {step.categories && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {step.categories.map((cat, j) => (
                      <div key={j} className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                        <div className={`h-1 ${cat.bar}`}></div>
                        <div className="p-4">
                          <div className="flex items-center justify-between mb-3">
                            <span className={`text-xs font-black px-3 py-1 rounded-full border ${cat.badge}`}>{cat.label}</span>
                          </div>
                          <div className="space-y-1.5 mb-4">
                            {cat.rules.map((rule, k) => (
                              <div key={k} className="flex items-start gap-2">
                                <Icon name="check" size={12} className="text-slate-400 mt-0.5 flex-shrink-0"/>
                                <p className="text-xs text-slate-600 leading-relaxed">{rule}</p>
                              </div>
                            ))}
                          </div>
                          <div className="pt-3 border-t border-slate-100">
                            <p className="text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Action</p>
                            <p className="text-xs text-slate-700 leading-relaxed">{cat.action}</p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Quick Reference Footer */}
      <div className="bg-slate-900 rounded-2xl p-6 grid grid-cols-2 md:grid-cols-4 gap-4">
        <div className="text-center">
          <p className="text-3xl font-black text-white">3</p>
          <p className="text-[10px] text-slate-400 uppercase tracking-wider mt-1">Min contacts for A & B</p>
        </div>
        <div className="text-center">
          <p className="text-3xl font-black text-white">15</p>
          <p className="text-[10px] text-slate-400 uppercase tracking-wider mt-1">Days max re-engagement (A/B)</p>
        </div>
        <div className="text-center">
          <p className="text-3xl font-black text-white">60</p>
          <p className="text-[10px] text-slate-400 uppercase tracking-wider mt-1">Days default follow-up task</p>
        </div>
        <div className="text-center">
          <p className="text-3xl font-black text-white">25</p>
          <p className="text-[10px] text-slate-400 uppercase tracking-wider mt-1">Sprint leads per week</p>
        </div>
      </div>
    </div>
  );
};

// ── MAIN APP ─────────────────────────────────────────────────────────
const App = () => {
  const [tab, setTab] = useState('flow');
  const [sp,  setSp]  = useState(0);
  const pdfDownload = "https://drive.google.com/uc?export=download&id=14nzhPHaAj9EGxET2OgJQjkbaLE48jrD4";

  const procs = [
    {id:'research',    title:"Market Research",   icon:"search",         color:"blue",    short:"Identify & Categorize",
     details:["Identify high-potential companies via Tracxn/Google.","CRM First: Add company to Zoho CRM immediately.","Categorization: Must mark as A, B, C, or D using Gemini Tool.","Identify at least 3 leads for A & B category accounts at this stage."],
     checkpoint:"Remember: Categorization is mandatory. Do not enter leads into CRM without Gemini tool verification."},
    {id:'outreach',    title:"Outreach",           icon:"phone-call",     color:"indigo",  short:"Connect & Engage",
     details:["Enrich contact data using Lusha or SignalHire.","Target Decision Makers only (Founders, CEO, Supply Chain Heads).","Identify Sales Hook / Trigger Events before calling.","Initial contact to introduce Edgistify services."],
     checkpoint:"Targeting the wrong person wastes time. If the Founder isn't available, find the Supply Chain Head."},
    {id:'follow-up',   title:"Follow Up",          icon:"calendar-clock", color:"amber",   short:"Task Persistence",
     details:["If client gives a timeline: Create task for that exact date.","If no timeline: Create mandatory follow-up task after 60 days.","No lead should remain idle without a scheduled next action.","Persistent research: If contact is wrong, find the correct person."],
     checkpoint:"The 60-day rule is non-negotiable for leads with no timeline. Persistence leads to conversion."},
    {id:'qualification',title:"Qualification",     icon:"check-circle",   color:"emerald", short:"Convert & Close",
     details:["MANDATORY: Explain all Edgistify services before marking 'No Requirement'.","Verify Lead to Qualification conversion metrics.","Confirm requirement fit and logistics relevance.","Schedule Demo or mark as Qualified in CRM."],
     checkpoint:"Accepting 'No Requirement' without explaining the full service portfolio is a process violation."},
  ];

  const rules = [
    {title:"CRM First",               desc:"Every company must be added to Zoho CRM immediately."},
    {title:"Categorization",          desc:"Categorize leads as A, B, C, or D based on revenue/potential."},
    {title:"Target Decision Makers",  desc:"Focus on Founders, CEOs, Directors, or Supply Chain Heads."},
    {title:"Persistent Research",     desc:"A wrong contact is not closure; find the correct person."},
    {title:"Service Education",       desc:"Explain all Edgistify services before marking 'No Requirement'."},
    {title:"Mandatory Follow-ups",    desc:"Create tasks for specific dates or a 60-day default."},
    {title:"Next Actions",            desc:"No lead should remain idle without a task/call/retry."},
    {title:"Sprint Priority",         desc:"High priority: Target 25 Sprint leads per week."},
  ];

  const tools = [
    {name:"Full Workflow PDF",      type:"Official Guide", url:pdfDownload, use:"Complete Process Flowchart & Visuals", download:true},
    {name:"Client Category Tool",   type:"Gemini",         url:"https://gemini.google.com/gem/1Y8ZoCIIZ1nEJP6kv6vIPs8gmH6l0rA7n", use:"Category, Logistics Relevance"},
    {name:"Sales Hook Tool",        type:"Gemini",         url:"https://gemini.google.com/gem/13G2iNa58sKNrGOQ-YIFhiA2FYTtS1XbA", use:"Trigger Events, Outreach Hooks"},
    {name:"Lusha",                  type:"Enrichment",     url:"https://www.lusha.com",        use:"Mobile numbers, Email IDs"},
    {name:"SignalHire",             type:"Enrichment",     url:"https://www.signalhire.com",    use:"Decision maker info"},
    {name:"Tracxn",                 type:"Research",       url:"https://tracxn.com",            use:"Startup data, Revenue estimates"},
  ];

  const tabs = [
    {key:'flow',       label:'Process Flow',      icon:'layout-list'},
    {key:'outreach',   label:'Outreach Guide',    icon:'book-open'},
    {key:'guidelines', label:'Guidelines & KPIs', icon:'bar-chart-2'},
    {key:'tools',      label:'Toolkit',           icon:'wrench'},
  ];

  return (
    <div className="min-h-screen">
      <nav className="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex justify-between h-16 items-center">
            <div className="flex items-center gap-2">
              <div className="bg-blue-600 p-2 rounded-lg text-white"><Icon name="target"/></div>
              <span className="font-bold text-xl tracking-tight text-slate-800">Edgistify Operations</span>
            </div>
            <div className="hidden md:flex space-x-1">
              {tabs.map(t=>(
                <button key={t.key} onClick={()=>setTab(t.key)} className={`flex items-center gap-1.5 px-3 py-2 rounded-md text-sm font-medium transition-colors ${tab===t.key?'bg-blue-50 text-blue-700':'text-slate-600 hover:text-blue-600'}`}>
                  <Icon name={t.icon} size={14}/> {t.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      </nav>

      <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        {/* ── PROCESS FLOW ── */}
        {tab==='flow'&&(
          <div className="space-y-8 animate-in">
            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div>
                <h1 className="text-2xl font-bold">Standard Operating Procedure</h1>
                <p className="text-slate-500 text-sm">Interactive guide for the lead qualification cycle.</p>
              </div>
              <a href={pdfDownload} download className="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-lg shadow-sm transition-all">
                <Icon name="download" size={16}/> Download PDF
              </a>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              {procs.map((p,i)=>(
                <button key={p.id} onClick={()=>setSp(i)} className={`group relative p-6 rounded-2xl border-2 transition-all text-left ${sp===i?`border-${p.color}-500 bg-${p.color}-50 shadow-lg`:'border-slate-200 bg-white hover:border-slate-300'}`}>
                  <div className={`mb-3 p-3 rounded-xl inline-block ${sp===i?`bg-${p.color}-600 text-white`:'bg-slate-100 text-slate-500'}`}><Icon name={p.icon} size={24}/></div>
                  <h3 className="font-bold text-lg leading-tight mb-1 text-slate-800">{p.title}</h3>
                  <p className={`text-xs ${sp===i?'text-slate-700':'text-slate-500'}`}>{p.short}</p>
                </button>
              ))}
            </div>
            <div className="p-8 rounded-3xl bg-white border-2 border-slate-100 shadow-xl">
              <div className="flex items-center gap-4 mb-6">
                <div className={`p-3 rounded-xl bg-${procs[sp].color}-600 text-white`}><Icon name={procs[sp].icon} size={28}/></div>
                <div>
                  <h2 className="text-2xl font-black text-slate-900 uppercase tracking-tight">{procs[sp].title} Stage</h2>
                  <p className="text-slate-500 text-sm">Core requirements for this phase</p>
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="space-y-4">
                  {procs[sp].details.map((d,i)=>(
                    <div key={i} className="flex gap-4 items-start">
                      <div className="mt-1 flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center font-bold text-xs">{i+1}</div>
                      <p className="text-slate-700 leading-relaxed">{d}</p>
                    </div>
                  ))}
                </div>
                <div className="p-6 rounded-2xl bg-slate-50 border border-slate-100">
                  <h4 className="font-bold text-sm uppercase tracking-wider mb-4 flex items-center gap-2 text-slate-800"><Icon name="alert-circle" size={16}/> Critical Checkpoint</h4>
                  <p className="text-sm text-slate-600 leading-relaxed italic">{procs[sp].checkpoint}</p>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── OUTREACH GUIDE ── */}
        {tab==='outreach'&&<OutreachGuidePage/>}

        {/* ── GUIDELINES ── */}
        {tab==='guidelines'&&(
          <div className="space-y-8 animate-in">
            <div>
              <h1 className="text-2xl font-bold text-slate-900">Guidelines & Performance KPIs</h1>
              <p className="text-slate-500 text-sm">Core standards and measurable targets for operational success.</p>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <div className="bg-blue-600 text-white p-6 rounded-2xl shadow-lg">
                <div className="flex justify-between items-start mb-2"><p className="text-blue-100 text-[10px] font-bold uppercase">Categorization</p><Icon name="pie-chart" size={16} className="text-blue-200"/></div>
                <h3 className="text-3xl font-black">99%</h3><p className="text-[10px] text-blue-100 mt-1 uppercase tracking-wider">Client Category Field Filled</p>
              </div>
              <div className="bg-indigo-600 text-white p-6 rounded-2xl shadow-lg">
                <div className="flex justify-between items-start mb-2"><p className="text-indigo-100 text-[10px] font-bold uppercase">Follow-up Speed</p><Icon name="clock" size={16} className="text-indigo-200"/></div>
                <h3 className="text-3xl font-black">15 Days</h3><p className="text-[10px] text-indigo-100 mt-1 uppercase tracking-wider">Max for Category A & B</p>
              </div>
              <div className="bg-white border-2 border-slate-100 p-6 rounded-2xl">
                <div className="flex justify-between items-start mb-2"><p className="text-slate-400 text-[10px] font-bold uppercase">Weekly Output</p><Icon name="zap" size={16} className="text-blue-500"/></div>
                <h3 className="text-3xl font-black text-slate-800">25</h3><p className="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">Sprint Leads / Week</p>
              </div>
              <div className="bg-white border-2 border-slate-100 p-6 rounded-2xl">
                <div className="flex justify-between items-start mb-2"><p className="text-slate-400 text-[10px] font-bold uppercase">Account Depth</p><Icon name="users" size={16} className="text-blue-500"/></div>
                <h3 className="text-3xl font-black text-slate-800">3</h3><p className="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">Contacts Per A/B Account</p>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              <div className="lg:col-span-2 space-y-4">
                <div className="flex items-center gap-2 mb-2"><Icon name="clipboard-check" className="text-blue-600"/><h2 className="text-xl font-bold">10 Golden Rules</h2></div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  {rules.map((r,i)=>(
                    <div key={i} className="bg-white p-4 rounded-xl border border-slate-200 flex gap-3 items-center hover:border-blue-200 transition-colors">
                      <div className="bg-slate-100 text-slate-500 font-bold w-6 h-6 flex items-center justify-center rounded-full text-[10px] shrink-0">{i+1}</div>
                      <div><h4 className="font-bold text-sm text-slate-800 leading-none mb-1">{r.title}</h4><p className="text-[11px] text-slate-500 leading-tight">{r.desc}</p></div>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div className="flex items-center gap-2 mb-4"><Icon name="shield-check" className="text-emerald-600"/><h2 className="text-xl font-bold">Quality Standards</h2></div>
                <div className="bg-emerald-50 border border-emerald-100 p-5 rounded-2xl space-y-4">
                  <div className="flex gap-3"><Icon name="check" size={18} className="text-emerald-600 mt-1 shrink-0"/><p className="text-sm text-emerald-900 leading-relaxed"><strong>CRM Integrity:</strong> 99% categorization is strictly monitored via audit reports.</p></div>
                  <div className="flex gap-3"><Icon name="check" size={18} className="text-emerald-600 mt-1 shrink-0"/><p className="text-sm text-emerald-900 leading-relaxed"><strong>Velocity:</strong> A & B leads must be re-engaged every 15 days to maintain sales momentum.</p></div>
                  <div className="flex gap-3"><Icon name="check" size={18} className="text-emerald-600 mt-1 shrink-0"/><p className="text-sm text-emerald-900 leading-relaxed"><strong>Exhaustive Outreach:</strong> Every service must be pitch-verified before disqualification.</p></div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── TOOLKIT ── */}
        {tab==='tools'&&(
          <div className="space-y-6 animate-in">
            <div>
              <h1 className="text-2xl font-bold text-slate-900">Operational Toolkit</h1>
              <p className="text-slate-500 text-sm">Approved software and AI tools for lead enrichment.</p>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              {tools.map((tool,i)=>(
                <div key={i} className="bg-white rounded-xl border border-slate-200 overflow-hidden hover:shadow-lg transition-all group flex flex-col">
                  <div className="p-4 border-b bg-slate-50 group-hover:bg-blue-50 transition-colors">
                    <span className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">{tool.type}</span>
                    <h3 className="font-bold text-slate-800">{tool.name}</h3>
                  </div>
                  <div className="p-4 flex flex-col flex-1">
                    <p className="text-xs text-slate-500 mb-6 flex-1 leading-relaxed">{tool.use}</p>
                    <a href={tool.url} {...(tool.download?{download:true}:{target:'_blank'})}
                       className="flex items-center justify-center gap-2 text-center py-2.5 bg-slate-100 hover:bg-blue-600 hover:text-white text-slate-800 text-xs font-bold rounded-lg transition-all">
                      {tool.download&&<Icon name="download" size={13}/>}
                      {tool.download?'Download PDF':'Open Resource'}
                    </a>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      <footer className="py-12 text-center text-slate-400 text-xs">
        <div className="flex justify-center gap-4 mb-2">
          <span className="flex items-center gap-1"><Icon name="check-circle" size={12}/> Process Verified</span>
          <span className="flex items-center gap-1"><Icon name="lock" size={12}/> Internal Use Only</span>
        </div>
        <p>© Edgistify Internal Operations • Lead Qualification Framework v2.1</p>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
